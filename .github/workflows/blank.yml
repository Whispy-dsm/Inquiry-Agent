name: Inquiry Agent CI/CD

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-main
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: inquiry-agent

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    outputs:
      sha_short: ${{ steps.vars.outputs.sha_short }}
      image_owner: ${{ steps.image.outputs.image_owner }}
      image: ${{ steps.image.outputs.image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get Git SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set image name
        id: image
        run: |
          OWNER="${GITHUB_REPOSITORY_OWNER,,}"
          IMAGE="${REGISTRY}/${OWNER}/${IMAGE_NAME}"

          echo "image_owner=${OWNER}" >> "$GITHUB_OUTPUT"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build
        run: npm run build

      - name: Login to GHCR
        # docker/login-action@v3
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        # docker/setup-buildx-action@v3
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - name: Build and push Docker image
        # docker/build-push-action@v6
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.image }}:latest
            ${{ steps.image.outputs.image }}:${{ steps.vars.outputs.sha_short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Encode Docker stack file
        id: stack
        run: |
          {
            echo 'stack_b64<<EOF'
            base64 -w 0 docker-stack.yml
            echo
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Prepare server directory
        # appleboy/ssh-action@v1.0.3
        uses: appleboy/ssh-action@029f5b4aeeeb58fdfe1410a5d17f967dacf36262
        env:
          SERVER_APP_DIR: ${{ secrets.SERVER_APP_DIR }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          envs: SERVER_APP_DIR
          script: |
            set -e

            APP_DIR="$(printf '%s' "${SERVER_APP_DIR}" | xargs)"
            if [ -z "${APP_DIR}" ]; then
              echo "SERVER_APP_DIR is empty after trimming whitespace" >&2
              exit 1
            fi

            mkdir -p "${APP_DIR}"

      - name: Deploy to server
        # appleboy/ssh-action@v1.0.3
        uses: appleboy/ssh-action@029f5b4aeeeb58fdfe1410a5d17f967dacf36262
        env:
          GITHUB_OWNER: ${{ needs.build-and-push.outputs.image_owner }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          GHCR_READ_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
          APP_ENV: ${{ secrets.APP_ENV }}
          SERVER_APP_DIR: ${{ secrets.SERVER_APP_DIR }}
          STACK_FILE_B64: ${{ steps.stack.outputs.stack_b64 }}

        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          envs: GITHUB_OWNER,IMAGE_NAME,GHCR_READ_TOKEN,APP_ENV,SERVER_APP_DIR,STACK_FILE_B64
          script: |
            set -e

            APP_DIR="$(printf '%s' "${SERVER_APP_DIR}" | xargs)"
            if [ -z "${APP_DIR}" ]; then
              echo "SERVER_APP_DIR is empty after trimming whitespace" >&2
              exit 1
            fi

            mkdir -p "${APP_DIR}"
            cd "${APP_DIR}"

            printf '%s' "${STACK_FILE_B64}" | base64 -d > docker-stack.yml
            if [ ! -s docker-stack.yml ]; then
              echo "docker-stack.yml was not written into $PWD" >&2
              exit 1
            fi

            printf '%s\n' "${APP_ENV}" > .env

            echo "${GHCR_READ_TOKEN}" | docker login ghcr.io \
              -u "${{ github.actor }}" \
              --password-stdin

            docker rm -f inquiry-agent 2>/dev/null || true
            docker-compose -f docker-stack.yml config | sed '/^name:/d' > docker-stack.rendered.yml
            docker stack deploy --detach=false --with-registry-auth -c docker-stack.rendered.yml inquiry-agent

            SERVICE_NAME=inquiry-agent_inquiry-agent

            cleanup_stopped_service_containers() {
              CONTAINERS=$(
                for STATUS in exited created dead; do
                  docker ps -aq \
                    --filter "label=com.docker.swarm.service.name=${SERVICE_NAME}" \
                    --filter "status=${STATUS}"
                done | sort -u
              )

              if [ -n "${CONTAINERS}" ]; then
                echo "Removing stopped ${SERVICE_NAME} containers:"
                echo "${CONTAINERS}"
                if ! echo "${CONTAINERS}" | xargs docker rm; then
                  echo "Some stopped ${SERVICE_NAME} containers could not be removed"
                fi
              else
                echo "No stopped ${SERVICE_NAME} containers to remove"
              fi
            }

            wait_for_service_containers_to_settle() {
              REPLICAS=$(docker service inspect "${SERVICE_NAME}" --format "{{if .Spec.Mode.Replicated}}{{.Spec.Mode.Replicated.Replicas}}{{else}}1{{end}}")

              for i in $(seq 1 24); do
                cleanup_stopped_service_containers

                TOTAL=$(docker ps -aq --filter "label=com.docker.swarm.service.name=${SERVICE_NAME}" | wc -l | tr -d ' ')
                RUNNING=$(docker ps -q --filter "label=com.docker.swarm.service.name=${SERVICE_NAME}" --filter "status=running" | wc -l | tr -d ' ')

                if [ "${TOTAL}" -le "${REPLICAS}" ] && [ "${RUNNING}" -eq "${REPLICAS}" ]; then
                  echo "Service containers settled: running=${RUNNING}, total=${TOTAL}, replicas=${REPLICAS}"
                  return 0
                fi

                echo "Waiting for old service containers to stop/remove: running=${RUNNING}, total=${TOTAL}, replicas=${REPLICAS}"
                docker ps -a --filter "label=com.docker.swarm.service.name=${SERVICE_NAME}"
                sleep 5
              done

              echo "Service containers did not settle after cleanup retries"
              docker ps -a --filter "label=com.docker.swarm.service.name=${SERVICE_NAME}"
              exit 1
            }

            wait_for_service_containers_to_settle
            docker container prune -f --filter "label=com.docker.swarm.service.name=${SERVICE_NAME}"
            docker image prune -f

  notify:
    needs:
      - build-and-push
      - deploy
    if: always()
    runs-on: ubuntu-latest
    env:
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

    steps:
      - name: Discord notification
        if: env.DISCORD_WEBHOOK_URL != ''
        run: |
          if [ "${{ needs.build-and-push.result }}" = "success" ] && [ "${{ needs.deploy.result }}" = "success" ]; then
            COLOR=3066993
            STATUS="PROD deploy succeeded"
          else
            COLOR=15158332
            STATUS="PROD deploy failed"
          fi

          curl -H "Content-Type: application/json" \
               -d "{
                 \"embeds\": [{
                   \"title\": \"${STATUS}\",
                   \"description\": \"Commit: \`${{ needs.build-and-push.outputs.sha_short }}\`\nBranch: \`${{ github.ref_name }}\`\nImage: \`${{ needs.build-and-push.outputs.image }}\`\",
                   \"color\": ${COLOR},
                   \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%S.000Z)\"
                 }]
               }" \
               "${DISCORD_WEBHOOK_URL}"
