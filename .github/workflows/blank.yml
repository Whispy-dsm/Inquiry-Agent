name: Inquiry Agent CI/CD

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-main
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: inquiry-agent

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    outputs:
      sha_short: ${{ steps.vars.outputs.sha_short }}
      image_owner: ${{ steps.image.outputs.image_owner }}
      image: ${{ steps.image.outputs.image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get Git SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set image name
        id: image
        run: |
          OWNER="${GITHUB_REPOSITORY_OWNER,,}"
          IMAGE="${REGISTRY}/${OWNER}/${IMAGE_NAME}"

          echo "image_owner=${OWNER}" >> "$GITHUB_OUTPUT"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build
        run: npm run build

      - name: Login to GHCR
        # docker/login-action@v3
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        # docker/setup-buildx-action@v3
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - name: Build and push Docker image
        # docker/build-push-action@v6
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.image }}:latest
            ${{ steps.image.outputs.image }}:${{ steps.vars.outputs.sha_short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare server directory
        # appleboy/ssh-action@v1.0.3
        uses: appleboy/ssh-action@029f5b4aeeeb58fdfe1410a5d17f967dacf36262
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            set -e
            mkdir -p "${{ secrets.SERVER_APP_DIR }}"

      - name: Upload docker compose file
        # appleboy/scp-action@v0.1.7
        uses: appleboy/scp-action@917f8b81dfc1ccd331fef9e2d61bdc6c8be94634
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          source: "docker-compose.yml"
          target: "${{ secrets.SERVER_APP_DIR }}"

      - name: Deploy to server
        # appleboy/ssh-action@v1.0.3
        uses: appleboy/ssh-action@029f5b4aeeeb58fdfe1410a5d17f967dacf36262
        env:
          GITHUB_OWNER: ${{ needs.build-and-push.outputs.image_owner }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          GHCR_READ_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
          APP_ENV: ${{ secrets.APP_ENV }}

        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          envs: GITHUB_OWNER,IMAGE_NAME,GHCR_READ_TOKEN,APP_ENV
          script: |
            set -e

            cd "${{ secrets.SERVER_APP_DIR }}"

            if [ ! -f docker-compose.yml ]; then
              COMPOSE_FILE="$(find . -maxdepth 3 -type f \( -name 'docker-compose.yml' -o -name 'docker-compose.yaml' -o -name 'compose.yml' -o -name 'compose.yaml' \) | head -n 1)"
              if [ -n "${COMPOSE_FILE}" ]; then
                cp "${COMPOSE_FILE}" ./docker-compose.yml
              fi
            fi

            if [ ! -f docker-compose.yml ]; then
              find . -maxdepth 3 -type f -print
              echo "docker-compose.yml was not uploaded into $PWD" >&2
              exit 1
            fi

            printf '%s\n' "${APP_ENV}" > .env

            echo "${GHCR_READ_TOKEN}" | docker login ghcr.io \
              -u "${{ github.actor }}" \
              --password-stdin

            docker-compose pull
            docker-compose up -d

            docker image prune -f

  notify:
    needs:
      - build-and-push
      - deploy
    if: always()
    runs-on: ubuntu-latest
    env:
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

    steps:
      - name: Discord notification
        if: env.DISCORD_WEBHOOK_URL != ''
        run: |
          if [ "${{ needs.build-and-push.result }}" = "success" ] && [ "${{ needs.deploy.result }}" = "success" ]; then
            COLOR=3066993
            STATUS="PROD deploy succeeded"
          else
            COLOR=15158332
            STATUS="PROD deploy failed"
          fi

          curl -H "Content-Type: application/json" \
               -d "{
                 \"embeds\": [{
                   \"title\": \"${STATUS}\",
                   \"description\": \"Commit: \`${{ needs.build-and-push.outputs.sha_short }}\`\nBranch: \`${{ github.ref_name }}\`\nImage: \`${{ needs.build-and-push.outputs.image }}\`\",
                   \"color\": ${COLOR},
                   \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%S.000Z)\"
                 }]
               }" \
               "${DISCORD_WEBHOOK_URL}"
