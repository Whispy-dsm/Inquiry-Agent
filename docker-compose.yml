services:
  inquiry-agent:
    image: ghcr.io/${GITHUB_OWNER}/${IMAGE_NAME}:latest
    container_name: inquiry-agent

    environment:
      NODE_ENV: production
      LOG_LEVEL: info

      GOOGLE_SHEET_ID: ${GOOGLE_SHEET_ID:?GOOGLE_SHEET_ID is required}
      GOOGLE_SHEET_NAME: ${GOOGLE_SHEET_NAME:?GOOGLE_SHEET_NAME is required}
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:?GOOGLE_OAUTH_CLIENT_ID is required}
      GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET:?GOOGLE_OAUTH_CLIENT_SECRET is required}
      GOOGLE_OAUTH_REFRESH_TOKEN: ${GOOGLE_OAUTH_REFRESH_TOKEN:?GOOGLE_OAUTH_REFRESH_TOKEN is required}
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN:?DISCORD_BOT_TOKEN is required}
      DISCORD_INQUIRY_CHANNEL_ID: ${DISCORD_INQUIRY_CHANNEL_ID:?DISCORD_INQUIRY_CHANNEL_ID is required}
      DISCORD_REVIEW_POST_INTERVAL_MS: ${DISCORD_REVIEW_POST_INTERVAL_MS:-1000}
      GEMINI_API_KEY: ${GEMINI_API_KEY:?GEMINI_API_KEY is required}
      GMAIL_FROM_EMAIL: ${GMAIL_FROM_EMAIL:?GMAIL_FROM_EMAIL is required}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:?WEBHOOK_SECRET is required}

      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash-lite}
      GMAIL_FROM_NAME: ${GMAIL_FROM_NAME:-Support Team}
      POLL_INTERVAL_MS: ${POLL_INTERVAL_MS:-600000}
      ENABLE_FALLBACK_POLLING: ${ENABLE_FALLBACK_POLLING:-true}
      WEBHOOK_PORT: ${WEBHOOK_PORT:-3000}
      DRY_RUN_EMAIL: ${DRY_RUN_EMAIL:-true}

    ports:
      - "${WEBHOOK_HOST_PORT:-3001}:${WEBHOOK_PORT:-3000}"

    restart: on-failure:1

    mem_limit: 300m
    mem_reservation: 150m

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:${WEBHOOK_PORT:-3000}/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"
        ]
      interval: 30s
      timeout: 10s
      retries: 1
      start_period: 30s
